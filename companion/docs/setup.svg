<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 470" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <rect width="380" height="470" rx="14" fill="#2a2927"/>
  <rect x="12" y="12" width="356" height="446" rx="14" fill="#323130" stroke="#46453f"/>

  <!-- header -->
  <circle cx="45" cy="46" r="17" fill="#213a57"/>
  <g transform="translate(36,37)" fill="none" stroke="#8fc0f4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="9" cy="4.5" rx="6" ry="2.2"/><path d="M3 4.5v4.5c0 1.2 2.7 2.2 6 2.2s6-1 6-2.2V4.5"/><path d="M3 9v4.5c0 1.2 2.7 2.2 6 2.2s6-1 6-2.2V9"/>
  </g>
  <text x="72" y="42" fill="#f4f3ee" font-size="15" font-weight="500">Set up unas</text>
  <text x="72" y="59" fill="#a9a7a0" font-size="12">No share connected yet</text>
  <line x1="28" y1="76" x2="352" y2="76" stroke="#46453f"/>

  <!-- step 1 (active) -->
  <rect x="28" y="88" width="324" height="50" rx="10" fill="#213a57"/>
  <circle cx="51" cy="113" r="13" fill="#8fc0f4"/>
  <text x="51" y="117" fill="#10243a" font-size="13" font-weight="500" text-anchor="middle">1</text>
  <text x="74" y="108" fill="#b6d6fb" font-size="14" font-weight="500">Connect to your NAS</text>
  <text x="74" y="125" fill="#8fc0f4" font-size="11.5" opacity="0.9">Mount the SMB/NFS share, or pick a mounted folder</text>

  <!-- step 2 -->
  <circle cx="51" cy="170" r="13" fill="none" stroke="#55534d"/>
  <text x="51" y="174" fill="#a9a7a0" font-size="13" text-anchor="middle">2</text>
  <text x="74" y="164" fill="#f4f3ee" font-size="14" font-weight="500">Point unas at the share</text>
  <text x="74" y="180" fill="#a9a7a0" font-size="11.5">Choose the folder to serve ·</text>
  <text x="74" y="194" fill="#a9a7a0" font-size="11.5">token + port auto-set</text>

  <!-- step 3 -->
  <circle cx="51" cy="232" r="13" fill="none" stroke="#55534d"/>
  <text x="51" y="236" fill="#a9a7a0" font-size="13" text-anchor="middle">3</text>
  <text x="74" y="226" fill="#f4f3ee" font-size="14" font-weight="500">Start serving</text>
  <text x="74" y="242" fill="#a9a7a0" font-size="11.5">Launch the daemon, confirm health,</text>
  <text x="74" y="256" fill="#a9a7a0" font-size="11.5">save config</text>

  <!-- step 1 input -->
  <text x="28" y="290" fill="#84827c" font-size="11" letter-spacing="0.5">STEP 1 — SHARE ADDRESS</text>
  <rect x="28" y="298" width="324" height="38" rx="8" fill="#3a3937"/>
  <g transform="translate(42,310)" fill="none" stroke="#a9a7a0" stroke-width="1.4" stroke-linejoin="round"><rect x="0" y="0.5" width="15" height="6" rx="1.4"/><rect x="0" y="9" width="15" height="6" rx="1.4"/><path d="M3 3.5h0.01M3 12h0.01"/></g>
  <text x="66" y="322" fill="#f4f3ee" font-size="13" font-family="ui-monospace, Menlo, monospace">smb://UNAS-Pro.local/share</text>

  <!-- buttons -->
  <rect x="28" y="350" width="196" height="44" rx="9" fill="#2f6fd0"/>
  <text x="126" y="377" fill="#ffffff" font-size="13" font-weight="500" text-anchor="middle">Connect &amp; mount</text>
  <rect x="236" y="350" width="116" height="44" rx="9" fill="none" stroke="#55534d"/>
  <text x="294" y="377" fill="#f4f3ee" font-size="12.5" text-anchor="middle">Choose folder…</text>

  <!-- step rail -->
  <rect x="28" y="416" width="158" height="3" rx="1.5" fill="#2f6fd0"/>
  <rect x="194" y="416" width="158" height="3" rx="1.5" fill="#3a3937"/>
</svg>
